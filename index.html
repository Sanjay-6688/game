<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Neon Racer</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <!-- Three.js import map -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="game-container">
        <!-- Canvas is injected by Three.js -->
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <h1>3D NEON RACER</h1>
                <p class="pulse">Press SPACE to Start</p>
                <p class="controls-hint">Use Arrow Keys or A/D to steer</p>
            </div>
            <div id="game-over-screen" class="screen hidden">
                <h1>CRASHED!</h1>
                <p>Score: <span id="final-score">0</span></p>
                <p class="pulse">Press SPACE to Restart</p>
            </div>
            <div id="hud" class="hidden">
                <div class="score-display">SCORE <span id="score">0</span></div>
                <div class="speed-display"><span id="speed">0</span> KM/H</div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
